<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT TRACKER V1.2 - GOLD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        
        :root { --gold: #ffd700; --dark: #000; }
        body { 
            background: var(--dark); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .osint-card { 
            width: 95%; max-width: 500px; border: 2px solid var(--gold); 
            padding: 25px; background: rgba(5,5,5,0.95); 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }

        h2 { 
            font-family: 'Orbitron'; text-align: center; font-size: 24px;
            text-shadow: 0 0 10px var(--gold); margin-bottom: 20px;
        }

        .info-box { 
            border: 1px solid #222; padding: 15px; margin-bottom: 15px; 
            background: #080808; font-size: 12px;
        }

        .label { color: #555; text-transform: uppercase; font-size: 10px; display: block; }
        .value { color: var(--gold); font-size: 14px; margin-bottom: 8px; display: block; }

        button { 
            width: 100%; padding: 15px; background: transparent; color: var(--gold); 
            border: 2px solid var(--gold); font-family: 'Orbitron'; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--gold); color: #000; }

        .terminal { 
            height: 120px; background: #000; border-top: 1px solid #111; 
            margin-top: 20px; padding: 10px; font-size: 11px; overflow-y: auto;
            color: #b8860b; border-left: 3px solid var(--gold);
        }
        .new-log { color: var(--gold); }
    </style>
</head>
<body>

<div class="osint-card">
    <h2>OSINT TRACKER V1.2</h2>

    <div class="info-box">
        <span class="label">IP Address</span>
        <span id="ip" class="value">FETCHING...</span>

        <span class="label">ISP / Provider</span>
        <span id="isp" class="value">FETCHING...</span>

        <span class="label">Precise Coordinates</span>
        <span id="coords" class="value">WAITING FOR PERMISSION...</span>
        
        <span class="label">Google Maps Link</span>
        <span id="map-link" class="value">-</span>
    </div>

    <button onclick="startTracking()">INITIATE REAL-TIME TRACKING</button>

    <div class="terminal" id="term">
        <div>> SYSTEM READY. AWAITING UPLINK...</div>
    </div>
</div>

<script>
    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `<div class="new-log">> ${m}</div>` + t.innerHTML;
    }

    // 1. Ambil Data IP & ISP (IP-API OSINT)
    async function fetchIP() {
        try {
            log("SCANNING NETWORK INTERFACE...");
            const response = await fetch('http://ip-api.com/json/');
            const data = await response.json();
            
            document.getElementById('ip').innerText = data.query;
            document.getElementById('isp').innerText = data.isp + " (" + data.as + ")";
            log(`IP DETECTED: ${data.query}`);
            log(`LOC: ${data.city}, ${data.country}`);
        } catch (e) {
            log("FAILED TO FETCH IP DATA.");
        }
    }

    // 2. Ambil Geolocation GPS (High Accuracy)
    function startTracking() {
        log("REQUESTING SATELLITE TRIANGULATION...");
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;

                    document.getElementById('coords').innerText = `${lat}, ${lon}`;
                    const link = `https://www.google.com/maps?q=${lat},${lon}`;
                    document.getElementById('map-link').innerHTML = `<a href="${link}" target="_blank" style="color:white">[ OPEN IN MAPS ]</a>`;
                    
                    log("COORDINATES LOCKED.");
                    log(`ACCURACY: ${acc} meters`);
                },
                (error) => {
                    log("ERROR: ACCESS DENIED BY TARGET.");
                    alert("Please allow location access for Satellite Uplink.");
                },
                { enableHighAccuracy: true }
            );
        } else {
            log("ERROR: BROWSER NOT SUPPORTED.");
        }
    }

    // Jalankan fetch IP saat loading
    fetchIP();
</script>

</body>
</html>
