<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT-LINK V1 - SATELLITE TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        
        :root { --gold: #ffd700; --dark: #000; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share Tech Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        .sat-card { 
            width: 90%; max-width: 500px; border: 2px solid var(--gold); padding: 30px; 
            background: rgba(5,5,5,0.9); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;
        }

        h2 { font-family: 'Orbitron'; text-align: center; letter-spacing: 3px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 5px var(--gold); } to { text-shadow: 0 0 20px var(--gold); } }

        .input-group { margin: 20px 0; }
        input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; 
            color: var(--gold); padding: 10px; outline: none; font-size: 16px; text-align: center;
        }
        input:focus { border-bottom: 1px solid var(--gold); }

        button { 
            width: 100%; padding: 15px; background: transparent; color: var(--gold); 
            border: 1px solid var(--gold); font-family: 'Orbitron'; cursor: pointer; font-weight: bold;
        }
        button:hover { background: var(--gold); color: #000; }

        #map-vibe { 
            height: 150px; border: 1px solid #111; margin: 20px 0; position: relative; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i10!2i838!3i415!2m3!1e0!2sm!3i407105189!3m8!2sen!3sid!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1f2');
            background-size: cover; overflow: hidden; display: none;
        }

        .scanner-line { width: 100%; height: 2px; background: var(--gold); position: absolute; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .terminal { font-size: 10px; color: #b8860b; height: 100px; overflow-y: auto; border-top: 1px solid #111; padding-top: 10px; }
    </style>
</head>
<body>

<div class="sat-card">
    <h2 id="title">SAT-LINK V1</h2>
    <div class="input-group">
        <input type="text" id="phone" placeholder="+62 8xx-xxxx-xxxx">
    </div>
    
    <button id="btn" onclick="locate()">LINK TO SATELLITE</button>

    <div id="map-vibe">
        <div class="scanner-line"></div>
    </div>

    <div class="terminal" id="term">> STANDBY FOR UPLINK...</div>
</div>

<script>
    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `<div>> ${m}</div>` + t.innerHTML;
    }

    async function locate() {
        const num = document.getElementById('phone').value;
        if(!num) return alert("INPUT TARGET NUMBER!");

        document.getElementById('btn').style.display = 'none';
        document.getElementById('map-vibe').style.display = 'block';
        
        log(`TARGETING: ${num}`);
        await sleep(1500); log("BYPASSING BTS FIREWALL...");
        await sleep(2000); log("UPLINK TO SAT-COM 4A ESTABLISHED.");
        await sleep(1500); log("TRIANGULATING SIGNAL...");
        await sleep(2000); 
        
        log("SUCCESS: TARGET COORDINATES FOUND.");
        log("LAT: -6.2088 | LONG: 106.8456");
        log("LOC: JAKARTA, INDONESIA");
        
        document.getElementById('title').innerText = "TARGET LOCKED";
        document.getElementById('title').style.animation = "none";
        document.getElementById('title').style.color = "red";
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
</script>

</body>
</html>
