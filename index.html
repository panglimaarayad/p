<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ ALIEN V6.0 - DATABREACH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
        :root { --gold: #ffd700; --dark: #000; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { 
            width: 95%; max-width: 500px; background: #050505; border: 2px solid var(--gold); 
            padding: 30px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); text-align: center;
        }

        h2 { font-family: 'Orbitron'; font-size: 28px; animation: rainbow 4s linear infinite; letter-spacing: 5px; margin-bottom: 5px; }
        @keyframes rainbow { 0% { color: #ff0000; } 25% { color: #ffff00; } 50% { color: #00ff00; } 75% { color: #00ffff; } 100% { color: #ff00ff; } }

        .osint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        .osint-item { 
            border: 1px solid #222; padding: 15px; background: #080808; 
            cursor: pointer; transition: 0.3s; font-size: 11px; text-transform: uppercase;
        }
        .osint-item:hover { border-color: var(--gold); background: #111; color: #fff; }

        .terminal { 
            background: #000; height: 100px; border: 1px solid #111; padding: 10px; 
            font-size: 10px; color: #b8860b; overflow-y: auto; margin-top: 20px; 
            text-align: left; border-left: 3px solid var(--gold);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>XYZ ALIEN</h2>
    <div style="font-size: 10px; color: #555; letter-spacing: 2px;">OSINT DATABASE V6.0</div>

    <div class="terminal" id="term">> AWAITING TARGET IDENTIFICATION...</div>

    <div class="osint-grid">
        <div class="osint-item" onclick="openTool('https://www.truecaller.com/')">📞 TrueCaller DB</div>
        <div class="osint-item" onclick="openTool('https://www.getcontact.com/')">🏷️ GetContact Tag</div>
        <div class="osint-item" onclick="openTool('https://intelx.io/')">🔓 Intelligence X</div>
        <div class="osint-item" onclick="openTool('https://leak-lookup.com/')">💧 Leak Lookup</div>
        <div class="osint-item" onclick="openTool('https://www.sync.me/')">🌐 Sync.ME Search</div>
        <div class="osint-item" onclick="openTool('https://lookup.robtex.com/')">🛰️ IP/DNS Lookup</div>
    </div>

    <div style="margin-top: 20px; font-size: 9px; color: #333;">
        [!] SELECT INTERFACE TO QUERY DATABASE
    </div>
</div>

<script>
    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `<div>> ${m}</div>` + t.innerHTML;
    }

    function openTool(url) {
        log(`REDIRECTING TO EXTERNAL DB: ${url.split('/')[2]}...`);
        setTimeout(() => {
            window.open(url, '_blank');
        }, 1000);
    }
</script>

</body>
</html>
