<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST TRACKER V5.2 - PURE GOLD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        
        :root { --gold: #ffd700; --dark: #000; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share Tech Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .card { 
            width: 95%; max-width: 480px; border: 2px solid var(--gold); padding: 25px; 
            background: #050505; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); text-align: center;
        }

        h2 { font-family: 'Orbitron'; font-size: 26px; animation: rainbow 5s linear infinite; letter-spacing: 3px; }
        @keyframes rainbow {
            0% { color: #ff0000; } 25% { color: #ffff00; } 50% { color: #00ff00; } 75% { color: #00ffff; } 100% { color: #ff00ff; }
        }

        .radar {
            width: 120px; height: 120px; border: 2px solid var(--gold); border-radius: 50%;
            margin: 20px auto; position: relative; overflow: hidden;
        }
        .radar::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 2px;
            background: var(--gold); transform-origin: left; animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .status-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; margin: 15px 0; font-size: 13px; text-align: left; }
        .label { color: #555; font-size: 10px; display: block; }

        button { 
            width: 100%; padding: 15px; background: transparent; color: var(--gold); 
            border: 2px solid var(--gold); font-family: 'Orbitron'; cursor: pointer; font-weight: bold;
        }
        button:hover { background: var(--gold); color: #000; }

        .terminal { height: 100px; overflow-y: auto; text-align: left; font-size: 11px; color: #b8860b; margin-top: 15px; border-top: 1px solid #111; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>XYZ ALIEN</h2>
    <div class="radar"></div>
    <div style="font-size: 10px; margin-bottom: 20px;">SATELLITE INTERFACE V5.2</div>

    <div class="status-box">
        <span class="label">PHONE TARGET</span>
        <input type="text" id="phone" placeholder="+62 8xxx-xxxx" style="width:100%; background:transparent; border:none; color:white; outline:none; font-family:inherit;">
        
        <div style="margin-top:10px;">
            <span class="label">LIVE COORDINATES</span>
            <span id="coords">WAITING FOR LINK...</span>
        </div>
    </div>

    <button onclick="getLoc()">LINK SATELLITE TO PHONE</button>

    <div class="terminal" id="term">> SYSTEM SECURED. READY FOR UPLINK.</div>
</div>

<script>
    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `<div>> ${m}</div>` + t.innerHTML;
    }

    function getLoc() {
        const phone = document.getElementById('phone').value;
        if(!phone) return alert("INPUT NOMOR HP TARGET!");

        log(`INJECTING EXPLOIT TO ${phone}...`);
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    document.getElementById('coords').innerText = `${lat}, ${lon}`;
                    log("CONNECTION SUCCESSFUL.");
                    log(`LAT: ${lat}`);
                    log(`LON: ${lon}`);
                    log(`ACCURACY: ${pos.coords.accuracy}m`);
                    log("OPENING MAPS UPLINK...");
                    
                    setTimeout(() => {
                        window.open(`https://www.google.com/maps?q=${lat},${lon}`, '_blank');
                    }, 2000);
                },
                (err) => {
                    log("CRITICAL ERROR: TARGET REJECTED UPLINK.");
                    alert("Gagal! Target harus mengizinkan akses lokasi di browser agar satelit bisa lock posisi.");
                },
                { enableHighAccuracy: true }
            );
        }
    }
</script>

</body>
</html>
